name: Release

# Publishing to PyPI happens only when a version tag is pushed. Cut the tag from
# a green `main` (CI is the merge gate) and this workflow builds the artifacts
# and uploads them via PyPI Trusted Publishing -- an OIDC exchange, so there is
# no API token and no stored secret anywhere in the repository.
#
#   uv version --bump patch   # or edit pyproject.toml, then commit on main
#   git tag v0.1.0
#   git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"

# Least privilege at the top level: the checkout only needs to read the tag.
# The publish job widens this to `id-token: write` locally (see below).
permissions:
  contents: read

jobs:
  release:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # A fork that happens to carry the same tag must never publish under this
    # project's identity.
    if: github.repository == 'jasonssdev/openkos'
    # The `pypi` environment is where PyPI scopes the Trusted Publisher and where
    # release protection rules (required reviewers, wait timers) attach. Its name
    # MUST match the "Environment name" configured on the PyPI publisher, or the
    # OIDC exchange is rejected.
    environment:
      name: pypi
      url: https://pypi.org/project/openkos/
    permissions:
      # `id-token: write` lets the runner mint the short-lived OIDC token PyPI
      # exchanges for a one-time upload token. This is the whole mechanism that
      # replaces a long-lived API token.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true

      # Guard against a tag/version mismatch before anything is built or
      # uploaded: a tag `v0.2.0` cut while pyproject still says `0.1.0` would
      # otherwise publish the wrong version number under the wrong name.
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(uv version --short)"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg" >&2
            exit 1
          fi

      # `uv build` exercises the same uv_build backend CI validates on every
      # change; building here from the tagged tree is what actually ships.
      - name: Build sdist and wheel
        run: uv build

      # Fail before uploading if the metadata or long description would be
      # rejected by PyPI, rather than after a partial or malformed publish.
      - name: Check distribution metadata
        run: uvx twine check dist/*

      # Trusted Publishing: uv reads the OIDC token minted above and exchanges it
      # with PyPI for a short-lived upload token. `always` makes a misconfigured
      # publisher fail loudly instead of silently falling back to a token that
      # does not exist.
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
