name: "✨ Feature request"
description: Propose a new capability or improvement
title: "feat: <short description>"
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem before the solution. The clearest requests start from a concrete use case.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and why is it hard today?
      placeholder: When I ingest a large folder, I can't tell which sources failed to compile ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like OpenKOS to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: mvp
    attributes:
      label: Which MVP does this fit?
      description: See docs/roadmap.md. Choose your best guess — maintainers can re-triage.
      options:
        - "MVP 1 — The Compiler"
        - "MVP 2 — The Graph and Memory"
        - "MVP 3 — The Runtime and Interoperability"
        - "Horizon (later / not yet committed)"
        - "Not sure"
    validations:
      required: true
  - type: checkboxes
    id: principles
    attributes:
      label: Consistency with project principles
      description: See the guiding principles in CONTRIBUTING.md. Confirm the request is compatible.
      options:
        - label: This works local-first (no mandatory cloud) and keeps output OKF-conformant.
          required: true
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
